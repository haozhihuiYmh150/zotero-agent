<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="600" height="180" viewBox="0 0 600 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="180" rx="12" fill="url(#bg)"/>

  <!-- Logo placeholder circle -->
  <circle cx="110" cy="90" r="55" fill="#2d3748"/>

  <!-- Embed icon.png -->
  <image x="55" y="35" width="110" height="110" xlink:href="icon.png" />

  <!-- Text -->
  <text x="200" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="bold" fill="#ffffff">Zotero Agent</text>

  <!-- Tagline -->
  <text x="200" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#a0aec0">给你的 Zotero 装上大脑</text>

  <!-- Decorative dots -->
  <circle cx="550" cy="35" r="4" fill="#4facfe" opacity="0.5"/>
  <circle cx="530" cy="50" r="3" fill="#00f2fe" opacity="0.4"/>
  <circle cx="560" cy="65" r="2" fill="#4facfe" opacity="0.3"/>
</svg>
