<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>

  <!-- LLM Provider -->
  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-provider"
      data-l10n-id="pref-provider"
      style="min-width: 120px"
    ></html:label>
    <menulist
      id="zotero-prefpane-__addonRef__-provider"
      preference="llm.provider"
      style="flex: 1"
    >
      <menupopup>
        <menuitem label="豆包 (Doubao)" value="doubao" />
        <menuitem label="OpenAI" value="openai" />
        <menuitem label="DeepSeek" value="deepseek" />
      </menupopup>
    </menulist>
  </hbox>

  <!-- API Key -->
  <hbox align="center" style="margin-top: 10px">
    <html:label
      for="zotero-prefpane-__addonRef__-apikey"
      data-l10n-id="pref-apikey"
      style="min-width: 120px"
    ></html:label>
    <html:input
      type="password"
      id="zotero-prefpane-__addonRef__-apikey"
      preference="llm.apiKey"
      style="flex: 1"
    />
  </hbox>

  <!-- API Base URL -->
  <hbox align="center" style="margin-top: 10px">
    <html:label
      for="zotero-prefpane-__addonRef__-apibase"
      data-l10n-id="pref-apibase"
      style="min-width: 120px"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-apibase"
      preference="llm.apiBase"
      placeholder="https://ark.cn-beijing.volces.com/api/v3"
      style="flex: 1"
    />
  </hbox>

  <!-- Model -->
  <hbox align="center" style="margin-top: 10px">
    <html:label
      for="zotero-prefpane-__addonRef__-model"
      data-l10n-id="pref-model"
      style="min-width: 120px"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-model"
      preference="llm.model"
      placeholder="doubao-seed-2-0-pro-260215"
      style="flex: 1"
    />
  </hbox>

  <!-- Test Connection Button -->
  <hbox style="margin-top: 15px">
    <button
      id="zotero-prefpane-__addonRef__-test"
      data-l10n-id="pref-test-connection"
      oncommand="
        Zotero.__addonInstance__.hooks.onPrefsEvent('test', { window })
      "
    />
    <html:span
      id="zotero-prefpane-__addonRef__-test-result"
      style="margin-left: 10px; line-height: 28px"
    ></html:span>
  </hbox>
</groupbox>
<vbox style="margin-top: 15px">
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
    style="color: #666; font-size: 12px"
  ></html:label>
</vbox>
